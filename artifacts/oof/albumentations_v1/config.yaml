data:
  images_train_dir: data/raw/train_images/train_images
  images_val_dir: data/raw/val_images/val_images
  images_test_dir: data/raw/test_images/test_images
  images_csv_path: data/raw
  train_df: data/raw/train_df.csv
  test_df: data/raw/test_df.csv
  val_df: data/raw/val_df.csv
  splits_json: data/splits/splits_v1.json
  dataset_version: ds_main_v1
  split_version: splits_v1
  image_col: image_id_ext
  label_col: result
  num_classes: 20
  image_size: 224
  resize_size: 256
model:
  backbone: convnext_tiny.in12k_ft_in1k
  pretrained: true
  whitelist:
  - convnext_tiny.in12k_ft_in1k
  - efficientnet_b0
  - resnet50
train:
  epochs: 3
  batch_size: 16
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.01
  amp: true
  seed: 42
debug:
  enabled: false
  train_samples: 64
  val_samples: 32
  epochs: 1
  num_workers: 0
checkpoint:
  dir: artifacts/checkpoints
  monitor: val_macro_f1
artifacts:
  roots:
    checkpoints: artifacts/checkpoints
    logs: artifacts/logs
    reports: reports
    mlflow: artifacts/logs/mlruns
  oof_dir: artifacts/oof/albumentations_v1
  report_path: reports/baseline_metrics_albumentations_v1.md
augmentation:
  library: albumentations
  policy: albumentations_v1
  random_resized_crop:
    scale:
    - 0.72
    - 1.0
    ratio:
    - 0.85
    - 1.15
  horizontal_flip_p: 0.5
  random_brightness_contrast:
    brightness_limit: 0.15
    contrast_limit: 0.15
    p: 0.5
  hue_saturation_value:
    hue_shift_limit: 5
    sat_shift_limit: 10
    val_shift_limit: 10
    p: 0.25
  clahe:
    clip_limit: 2.0
    p: 0.05
  affine:
    scale:
    - 0.95
    - 1.05
    translate_percent:
    - -0.03
    - 0.03
    rotate:
    - -5.0
    - 5.0
    p: 0.1
  to_gray_p: 0.05
  coarse_dropout:
    num_holes_range:
    - 1
    - 2
    hole_height_range:
    - 0.05
    - 0.14
    hole_width_range:
    - 0.05
    - 0.14
    p: 0.15
  label_smoothing: 0.05
experiment:
  version: v03_albumentations
  loss: ce_label_smoothing_005
  sampler: shuffle
  ratio_policy: none
  weak_label_flag: false
  feature_flags: img
  tta_flag: false
mlflow:
  tracking_uri: sqlite:///artifacts/logs/mlflow.db
  experiment_name: room_type_image_albumentations
  artifact_root: artifacts/logs/mlruns
