data:
  images_train_dir: data/raw/train_images/train_images
  images_val_dir: data/raw/val_images/val_images
  images_test_dir: data/raw/test_images/test_images
  images_csv_path: data/raw
  train_df: data/raw/train_df.csv
  test_df: data/raw/test_df.csv
  val_df: data/raw/val_df.csv
  splits_json: data/splits/splits_v1.json
  weak_manifest: data/processed/weak_downloaded_v1.csv
  dataset_version: ds_main_v1
  split_version: splits_v1
  image_col: image_id_ext
  label_col: result
  num_classes: 20
  image_size: 224
  resize_size: 256
model:
  backbone: convnext_tiny.in12k_ft_in1k
  pretrained: true
  whitelist:
  - convnext_tiny.in12k_ft_in1k
  - efficientnet_b0
  - resnet50
train:
  epochs: 3
  batch_size: 16
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.01
  amp: true
  seed: 42
debug:
  enabled: false
  train_samples: 64
  val_samples: 32
  epochs: 1
  num_workers: 0
checkpoint:
  dir: artifacts/checkpoints
  monitor: val_macro_f1
artifacts:
  roots:
    checkpoints: artifacts/checkpoints
    logs: artifacts/logs
    reports: reports
    mlflow: artifacts/logs/mlruns
  oof_dir: artifacts/oof/weak_images_v1
  report_path: reports/weak_images_v1.md
augmentation:
  library: torchvision
  policy: baseline_v1
  label_smoothing: 0.0
experiment:
  version: weak_images_v1
  weak_label_flag: true
  weak_weight: 0.35
  weak_manifest_version: weak_downloaded_v1
  max_added_per_class:
    5: 180
    6: 80
    11: 200
  sampler: shuffle
  loss: ce
  sample_weight_policy: source_x_ratio
  ratio_policy: clip_075_100
  class_weight_policy: sqrt_median_effective
  weight_clip_max: 2.5
  feature_flags: img_weak
  tta_flag: false
mlflow:
  tracking_uri: sqlite:///artifacts/logs/mlflow.db
  experiment_name: room_type_image_baseline
  artifact_root: artifacts/logs/mlruns
