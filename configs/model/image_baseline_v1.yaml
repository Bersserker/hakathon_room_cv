data:
  images_train_dir: data/room_type/train_images/train_images
  images_val_dir: data/room_type/val_images/val_images
  images_test_dir: data/room_type/test_images/test_images
  images_csv_path: data/room_type
  train_df: data/room_type/train_df.csv
  test_df: data/room_type/test_df.csv
  val_df: data/room_type/val_df.csv
  splits_dir: data/room_type/splits_v1
  image_col: image_id_ext
  label_col: result
  num_classes: 20

model:
  backbone: convnext_tiny.in12k_ft_in1k
  pretrained: true
  whitelist:
    - convnext_tiny.in12k_ft_in1k
    - efficientnet_b0
    - resnet50

train:
  epochs: 3
  batch_size: 16
  num_workers: 4
  lr: 0.0001
  weight_decay: 0.01
  amp: true
  seed: 42

debug:
  enabled: false
  train_samples: 64
  val_samples: 32
  epochs: 1
  num_workers: 0

checkpoint:
  dir: artifacts/checkpoints
  monitor: val_macro_f1

mlflow:
  tracking_uri: sqlite:///artifacts/logs/mlflow.db
  experiment_name: room_type_image_baseline